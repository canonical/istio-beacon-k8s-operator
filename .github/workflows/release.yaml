name: Release Charm

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - track/**

permissions:
  # Required for all workflows
  security-events: write
  # Only required for workflows in private repositories
  actions: read
  # Write permission needed for the reusable workflow to push git tags
  contents: write

jobs:
  release:
    uses: canonical/observability/.github/workflows/charm-release.yaml@v2
    secrets: inherit
    with:
      default-track: dev
      automatically-retry-hooks: true # A fix for #8
      provider: 'microk8s'
      # remove it when this is resolved: https://github.com/canonical/charmcraft/issues/2707
      charmcraft-channel: 'latest/beta'
